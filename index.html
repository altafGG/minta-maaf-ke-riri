<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Riri ✨</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: #880e4f;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.8);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
            z-index: 10;
        }

        h1 { font-size: 2rem; margin-bottom: 10px; }
        p { font-size: 1.1rem; line-height: 1.6; }

        .btn {
            background-color: #ec407a;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }

        .btn:hover { background-color: #d81b60; transform: scale(1.05); }

        /* Animasi Hati */
        .heart {
            position: absolute;
            color: #f06292;
            font-size: 20px;
            user-select: none;
            animation: float 5s linear infinite;
            opacity: 0;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="title">Halo Riri... 🌸</h1>
        <p id="message">Aku mau minta maaf ya kalau ada salah semalam. Aku buat ini khusus buat kamu biar kamu nggak sedih lagi.</p>
        <button class="btn" onclick="nextStep()">Klik di sini</button>
    </div>

    <script>
        // Fungsi untuk animasi hati melayang
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 3 + 's';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }
        setInterval(createHeart, 300);

        // Fungsi interaktif
        function nextStep() {
            const title = document.getElementById('title');
            const msg = document.getElementById('message');
            title.innerText = "Maafin aku ya? 🥺";
            msg.innerText = "Janji deh besok-besok aku bakal lebih dengerin kamu. Senyum dong, Ri!";
            document.querySelector('.btn').style.display = 'none';
        }
    </script>
</body>
</html>
